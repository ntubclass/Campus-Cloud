<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模板與配置推薦</title>
    <style>
      :root {
        --bg: #f3efe7;
        --surface: rgba(255, 252, 247, 0.95);
        --surface-2: rgba(255, 255, 255, 0.82);
        --text: #17231a;
        --muted: #627066;
        --line: rgba(23, 35, 26, 0.1);
        --accent: #155eef;
        --accent-soft: rgba(21, 94, 239, 0.08);
        --danger: #b54708;
        --radius: 22px;
        --shadow: 0 18px 44px rgba(24, 35, 27, 0.1);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans TC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(21, 94, 239, 0.1), transparent 26%),
          linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      }

      .page {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }

      .hero,
      .panel,
      .result-card,
      .machine-row {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero,
      .panel,
      .result-card {
        padding: 22px;
      }

      .hero {
        margin-bottom: 20px;
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1;
      }

      .hero p,
      .muted {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .layout {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .form-grid,
      .results,
      .result-stack,
      .template-list,
      .machine-list {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.92rem;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #fffefa;
        color: var(--text);
        border-radius: 16px;
        padding: 12px 14px;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      .split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 12px;
      }

      .primary,
      .ghost {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), #3b82f6);
        color: #fff;
        font-weight: 700;
      }

      .ghost {
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        border: 1px solid var(--line);
      }

      .empty {
        min-height: 420px;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
      }

      .section-title {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      .reason-box {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(21, 94, 239, 0.05);
        border: 1px solid rgba(21, 94, 239, 0.12);
        line-height: 1.7;
      }

      .template-item,
      .machine-row {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-2);
      }

      .template-item {
        display: grid;
        gap: 8px;
      }

      .template-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .template-top h4,
      .machine-top h4 {
        margin: 0;
        font-size: 1rem;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        border: 1px solid rgba(21, 94, 239, 0.12);
        color: #1849a9;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .template-note,
      .machine-note {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      .machine-list {
        gap: 12px;
      }

      .machine-row {
        display: grid;
        gap: 10px;
      }

      .machine-top {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }

      .machine-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .machine-badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        font-size: 0.82rem;
      }

      .machine-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .machine-metric {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
      }

      .machine-metric .label {
        color: var(--muted);
        font-size: 0.76rem;
        margin-bottom: 4px;
      }

      .machine-metric .value {
        font-weight: 700;
      }

      .warning {
        padding: 14px 16px;
        border-radius: 18px;
        color: var(--danger);
        background: rgba(181, 71, 8, 0.08);
        border: 1px solid rgba(181, 71, 8, 0.14);
      }

      @media (max-width: 1040px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .split,
        .machine-metrics {
          grid-template-columns: 1fr;
        }

        .machine-top,
        .template-top {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <h1>模板與配置推薦</h1>
        <p>只需填寫需求輸入、身份、情境與資源策略，其他由 AI 根據節點與模板自行判斷。</p>
      </section>

      <section class="layout">
        <div class="panel">
          <h2>需求輸入</h2>
          <form id="recommend-form" class="form-grid">
            <div class="field">
              <label for="goal">描述你要部署的服務</label>
              <textarea id="goal">我想幫學生專題團隊部署 n8n，會對外開放，也希望之後可以擴充。</textarea>
            </div>

            <div class="split">
              <div class="field">
                <label for="role">身份</label>
                <select id="role">
                  <option value="student">學生</option>
                  <option value="teacher">老師</option>
                </select>
              </div>
              <div class="field">
                <label for="course_context">情境</label>
                <select id="course_context">
                  <option value="coursework">課程作業</option>
                  <option value="teaching">教學用途</option>
                  <option value="research">研究用途</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="budget_mode">資源策略</label>
              <select id="budget_mode">
                <option value="resource-saving">節省資源</option>
                <option value="balanced" selected>平衡</option>
                <option value="performance">效能優先</option>
              </select>
            </div>

            <div class="actions">
              <button class="primary" type="submit">開始推薦</button>
              <button class="ghost" type="button" id="fill-ai-training">AI 範例</button>
            </div>
          </form>
        </div>

        <div class="results" id="results">
          <div class="empty">
            <div>
              <strong>尚未產生推薦。</strong>
              <p>送出後只會顯示原因、推薦模板與配置內容。</p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const form = document.getElementById("recommend-form");
      const results = document.getElementById("results");
      const sampleButton = document.getElementById("fill-ai-training");
      let apiBaseUrl = "";

      function apiUrl(path) {
        return `${apiBaseUrl}${path}`;
      }

      function escapeHtml(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function mapDeploymentType(value) {
        return {
          lxc: "LXC",
          vm: "VM",
        }[String(value || "").toLowerCase()] || value || "-";
      }

      function getPayload() {
        return {
          goal: document.getElementById("goal").value,
          role: document.getElementById("role").value,
          course_context: document.getElementById("course_context").value,
          budget_mode: document.getElementById("budget_mode").value,
          top_k: 5,
          device_nodes: [],
        };
      }

      function renderTemplateItems(items) {
        if (!items.length) {
          return `<div class="template-item"><h4>目前沒有推薦模板</h4></div>`;
        }

        return items.map((item) => `
          <div class="template-item">
            <div class="template-top">
              <h4>${escapeHtml(item.name)}</h4>
              <span class="tag">${escapeHtml(item.slug)}</span>
            </div>
            <p class="template-note">${escapeHtml(item.why || "")}</p>
          </div>
        `).join("");
      }

      function renderMachineItems(items) {
        if (!items.length) {
          return `<div class="machine-row"><p class="machine-note">目前沒有可顯示的配置內容。</p></div>`;
        }

        return items.map((machine) => `
          <div class="machine-row">
            <div class="machine-top">
              <div>
                <h4>${escapeHtml(machine.name)}</h4>
                <p class="machine-note">${escapeHtml(machine.why || "")}</p>
              </div>
              <span class="tag">${escapeHtml(mapDeploymentType(machine.deployment_type))}</span>
            </div>
            <div class="machine-meta">
              <span class="machine-badge">模板: ${escapeHtml(machine.template_slug)}</span>
              <span class="machine-badge">角色: ${escapeHtml(machine.purpose)}</span>
              <span class="machine-badge">節點: ${escapeHtml(machine.assigned_node || "未指定")}</span>
            </div>
            <div class="machine-metrics">
              <div class="machine-metric">
                <div class="label">CPU</div>
                <div class="value">${escapeHtml(machine.cpu)}</div>
              </div>
              <div class="machine-metric">
                <div class="label">記憶體</div>
                <div class="value">${escapeHtml(machine.memory_mb)} MB</div>
              </div>
              <div class="machine-metric">
                <div class="label">磁碟</div>
                <div class="value">${escapeHtml(machine.disk_gb)} GB</div>
              </div>
            </div>
          </div>
        `).join("");
      }

      function renderResponse(data) {
        const recommendedTemplates = [
          ...(data.final_plan?.recommended_templates || []),
          ...(data.final_plan?.possible_needed_templates || []),
        ].filter((item, index, array) => array.findIndex((candidate) => candidate.slug === item.slug) === index);

        results.innerHTML = `
          <div class="result-stack">
            <section class="result-card">
              <h3 class="section-title">原因</h3>
              <div class="reason-box">${escapeHtml(data.summary || data.final_plan?.overall_config?.deployment_strategy || "")}</div>
            </section>

            <section class="result-card">
              <h3 class="section-title">推薦模板</h3>
              <div class="template-list">${renderTemplateItems(recommendedTemplates)}</div>
            </section>

            <section class="result-card">
              <h3 class="section-title">配置內容</h3>
              <div class="machine-list">${renderMachineItems(data.final_plan?.machines || [])}</div>
            </section>
          </div>
        `;
      }

      async function loadUiConfig() {
        try {
          const response = await fetch("/ui-config");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          apiBaseUrl = (data.api_base_url || "").replace(/\/$/, "");
        } catch (error) {
          console.warn("讀取 UI 設定失敗，改用相對路徑。", error);
          apiBaseUrl = "";
        }
      }

      async function submitRecommendation(event) {
        event.preventDefault();
        results.innerHTML = `<div class="empty"><div><strong>AI 正在分析模板與配置...</strong></div></div>`;

        try {
          const response = await fetch(apiUrl("/recommend"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(getPayload()),
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || `HTTP ${response.status}`);
          }

          renderResponse(await response.json());
        } catch (error) {
          results.innerHTML = `<div class="warning">${escapeHtml(error.message || "未知錯誤")}</div>`;
        }
      }

      sampleButton.addEventListener("click", () => {
        document.getElementById("goal").value = "我想為老師主導的研究實驗室建立視覺 AI 訓練環境，之後還要能展示推論結果。";
        document.getElementById("role").value = "teacher";
        document.getElementById("course_context").value = "research";
        document.getElementById("budget_mode").value = "performance";
      });

      loadUiConfig().finally(() => {
        form.addEventListener("submit", submitRecommendation);
      });
    </script>
  </body>
</html>
