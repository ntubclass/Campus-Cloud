name: Migration sanity

on:
  pull_request:
    paths:
      - "backend/app/models/**"
      - "backend/app/alembic/**"
      - "backend/scripts/check-migrations.sh"

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync backend deps
        run: uv sync --frozen

      - name: Run migration check
        run: bash scripts/check-migrations.sh
